<!DOCTYPE html>
<html lang="th" data-theme="dark" data-style="solid">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Community · 3006</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.22.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;600;700;800;900&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav id="navbar" class="show"></nav>
<div id="burgerMenu"></div>

<div class="comm-v3">
  <div class="cv3-header">
    <div class="cv3-title-row">
      <div>
        <div class="cv3-title"><i class="ti ti-message-2" style="color:#60a5fa;margin-right:8px"></i>Community</div>
        <div class="cv3-sub">ม.3/6 · พูดคุย แชร์ ถามตอบ</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="aiFilterBtn" class="cv3-filter-btn" onclick="toggleAIFilter()" style="display:none">
          <i class="ti ti-sparkles"></i> AI กรอง
        </button>
        <div class="cv3-live-badge">● LIVE</div>
      </div>
    </div>
  </div>

  <div class="cv3-compose">
    <div class="cv3-compose-top">
      <div class="cv3-compose-ava" id="cvAva">?</div>
      <textarea id="commInput" class="cv3-textarea" placeholder="แชร์ความคิด ถามคำถาม หรือพูดคุยกัน..." maxlength="400" oninput="updateCharCount()"></textarea>
    </div>
    <div class="cv3-compose-foot">
      <div class="cv3-char" id="charCount">0 / 400</div>
      <button class="cv3-post-btn" onclick="submitPost()">
        <i class="ti ti-send" style="font-size:.9rem"></i> โพสต์
      </button>
    </div>
  </div>

  <div id="commFeed" class="cv3-feed">
    <div class="cv3-loading">กำลังโหลด...</div>
  </div>
</div>

<!-- Reply modal -->
<div id="replyModal" onclick="if(event.target===this)closeReplyModal()" style="display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);align-items:flex-end;justify-content:center">
  <div class="reply-sheet">
    <div class="reply-sheet-hd">
      <div class="reply-sheet-title"><i class="ti ti-message-reply" style="color:#60a5fa;margin-right:6px"></i>ตอบกลับ</div>
      <button onclick="closeReplyModal()" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:1.1rem"><i class="ti ti-x"></i></button>
    </div>
    <div id="replyParentPost" class="reply-parent"></div>
    <textarea id="replyInput" placeholder="เขียนคำตอบ..." maxlength="300" class="cv3-textarea" style="min-height:80px;margin-top:8px"></textarea>
    <div style="display:flex;justify-content:flex-end;padding:8px 0 0">
      <button class="cv3-post-btn" onclick="submitReply()"><i class="ti ti-send"></i> ส่ง</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/shared.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/community.js"></script>
</body>
</html>
