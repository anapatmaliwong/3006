<!DOCTYPE html>
<html lang="th" data-theme="dark" data-style="solid">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Settings · 3006</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.22.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;600;700;800;900&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav id="navbar" class="show"></nav>
<div id="burgerMenu"></div>

<div class="sv3-page">
  <!-- Profile Card -->
  <div class="sv3-profile-card">
    <div class="sv3-profile-bg"></div>
    <div class="sv3-profile-content">
      <div class="sv3-ava-wrap" onclick="document.getElementById('profilePicInput2').click()">
        <div class="sv3-ava" id="svAva">?</div>
        <div class="sv3-ava-badge">📷</div>
        <input type="file" id="profilePicInput2" accept="image/*" style="display:none" onchange="uploadProfilePicSettings(this)">
      </div>
      <div class="sv3-profile-info">
        <div class="sv3-profile-name" id="svName">-</div>
        <div class="sv3-profile-id" id="svStudentInfo">-</div>
        <div class="sv3-profile-rank" id="svRank">Novice · Lv.1</div>
      </div>
      <div class="sv3-profile-xp">
        <div class="sv3-xp-label">XP <span id="svXP">0</span></div>
        <div class="sv3-xp-bar"><div class="sv3-xp-fill" id="svXPFill"></div></div>
      </div>
    </div>
  </div>

  <div class="sv3-sections">
    <!-- Account -->
    <div class="sv3-sec">
      <div class="sv3-sec-title">👤 Account</div>
      <div class="sv3-row">
        <div class="sv3-row-left">
          <div class="sv3-row-label">Display Name</div>
          <div class="sv3-row-hint">ชื่อที่แสดงใน Community &amp; Leaderboard</div>
        </div>
        <div class="sv3-row-right">
          <input class="sv3-input" id="displayNameInput" placeholder="ชื่อที่แสดง" maxlength="30">
          <button class="sv3-save-btn" onclick="saveDisplayName()">บันทึก</button>
        </div>
      </div>
      <div class="sv3-row">
        <div class="sv3-row-left">
          <div class="sv3-row-label">รูปโปรไฟล์</div>
          <div class="sv3-row-hint">อัปโหลดจาก device</div>
        </div>
        <div class="sv3-row-right">
          <button class="sv3-save-btn" onclick="document.getElementById('profilePicInput2').click()">📷 เปลี่ยนรูป</button>
        </div>
      </div>
    </div>

    <!-- Appearance -->
    <div class="sv3-sec">
      <div class="sv3-sec-title">🎨 Appearance</div>
      <div class="sv3-row">
        <div class="sv3-row-left"><div class="sv3-row-label">Theme</div></div>
        <div class="seg" id="themeSeg">
          <button class="seg-btn active" onclick="setTheme('dark',this)">🌑 Dark</button>
          <button class="seg-btn" onclick="setTheme('light',this)">☀️ Light</button>
        </div>
      </div>
      <div class="sv3-row">
        <div class="sv3-row-left"><div class="sv3-row-label">Button Style</div></div>
        <div class="seg" id="styleSeg">
          <button class="seg-btn active" onclick="setBtnStyle('solid',this)">◼ Solid</button>
          <button class="seg-btn" onclick="setBtnStyle('glass',this)">🫧 Glass</button>
        </div>
      </div>
      <div class="sv3-row">
        <div class="sv3-row-left">
          <div class="sv3-row-label">Lite Mode</div>
          <div class="sv3-row-hint">ปิดอนิเมชัน ประหยัดแบต</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="liteToggle" onchange="setLite(this.checked)">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <!-- Logout -->
    <div class="sv3-sec sv3-danger-sec">
      <div class="sv3-sec-title">⚠️ Session</div>
      <button class="sv3-logout-btn" onclick="API.logout()">↩ ออกจากระบบ</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/shared.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/settings.js"></script>
</body>
</html>
